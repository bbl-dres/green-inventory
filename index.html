<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grünflächen Inventar – BBL</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-title">
      <span class="header-agency">Bundesamt für Bauten und Logistik</span>
      <span class="header-app">Grünflächen Inventar</span>
    </div>
    <div class="header-right">
<button class="edit-btn" id="edit-toggle" title="Position korrigieren">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Position bearbeiten
      </button>
    </div>
  </header>

  <!-- ── Body ───────────────────────────────────────────────────────────── -->
  <div id="body">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">Legende</div>
      <div id="legend-scroll" id="legend-list"></div>
    </aside>

    <!-- Map + Table column -->
    <div id="main-content">

      <!-- Map -->
      <div id="map">
        <div id="edit-banner">Ziehen Sie die Karte, um alle Features zu verschieben. Klicken Sie auf Speichern.</div>
        <!-- Basemap switcher -->
        <div id="basemap-switcher">
          <div class="bm-panel" id="bm-panel"></div>
          <button class="bm-btn" id="bm-btn" title="Hintergrund wechseln">
            <img id="bm-current-thumb" alt="Hintergrund">
            <span>Hintergrund</span>
          </button>
        </div>
        <div id="save-banner">
          <span id="offset-label">Verschiebung: 0 m, 0 m</span>
          <button id="save-offset">Speichern</button>
          <button class="cancel-btn" id="cancel-offset">Abbrechen</button>
        </div>
        <!-- Toggle lives inside #map so it stays visible when table collapses -->
        <button id="tbl-toggle" title="Tabelle ein-/ausblenden">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          Attributtabelle
        </button>
      </div>

      <!-- Table panel -->
      <div id="table-panel">

        <!-- Action bar -->
        <div id="tbl-action-bar">
          <div id="tbl-search-wrap">
            <svg id="tbl-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="tbl-search" placeholder="Suche…">
          </div>

          <div id="tbl-action-right">
            <div class="dd-wrap" id="col-dd-wrap">
              <button class="dd-btn" id="col-dd-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                  <line x1="8" y1="18" x2="21" y2="18"/>
                  <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                  <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                Spalten
                <svg class="dd-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" id="tbl-col-dd" style="right:0;left:auto"></div>
            </div>

            <div class="dd-wrap" id="filter-dd-wrap">
              <button class="dd-btn" id="filter-dd-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                Filter
                <span class="tbl-badge" id="tbl-filter-badge" style="display:none"></span>
                <svg class="dd-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" id="tbl-filter-dd" style="min-width:230px;right:0;left:auto"></div>
            </div>

            <div class="dd-wrap" id="export-dd-wrap">
              <button class="dd-btn" id="export-dd-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export
                <svg class="dd-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" id="tbl-export-dd" style="right:0;left:auto">
                <div class="dd-menu-label">Alle Daten</div>
                <div class="dd-item" id="exp-csv">CSV</div>
                <div class="dd-item" id="exp-geojson">GeoJSON</div>
                <div class="dd-item" id="exp-xlsx">Excel</div>
                <div class="dd-divider"></div>
                <div class="dd-menu-label">Gefilterte Daten</div>
                <div class="dd-item" id="exp-csv-f">CSV</div>
                <div class="dd-item" id="exp-geojson-f">GeoJSON</div>
                <div class="dd-item" id="exp-xlsx-f">Excel</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div id="table-scroll">
          <table id="tbl">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Pagination bar: [size] · [nav cluster] · [info] -->
        <div id="tbl-pagination">
          <select id="pg-size-select" title="Zeilen pro Seite">
            <option value="10">10 / Seite</option>
            <option value="25" selected>25 / Seite</option>
            <option value="50">50 / Seite</option>
            <option value="100">100 / Seite</option>
          </select>
          <div class="pg-spacer"></div>
          <button class="pg-btn" id="pg-first" title="Erste Seite">«</button>
          <button class="pg-btn" id="pg-prev"  title="Vorherige Seite">‹</button>
          <div id="pg-pages"></div>
          <button class="pg-btn" id="pg-next"  title="Nächste Seite">›</button>
          <button class="pg-btn" id="pg-last"  title="Letzte Seite">»</button>
          <div class="pg-spacer"></div>
          <span class="pg-info" id="pg-info"></span>
        </div>
      </div>

    </div><!-- #main-content -->

  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer id="footer">
    <div id="coordinates">WGS 84 | Koordinaten: --</div>
    <div id="footer-links">
      <a href="https://github.com/bbl-dres/green-inventory" target="_blank">Quellcode</a>
      <a href="https://www.admin.ch/gov/de/start/rechtliches.html" target="_blank">Rechtliches</a>
      <a href="https://www.bbl.admin.ch/de/kontakt" target="_blank">Kontakt</a>
    </div>
  </footer>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════════════════════════════
// LEGEND DEFINITION  (mirrors the plan legend exactly)
// Each group: { id, label, category (for map filter), items[] }
// Each item:  { label, swatchClass?, fill?, stroke?, note? }
// ═══════════════════════════════════════════════════════════════════════════
const LEGEND_GROUPS = [
  {
    id: "lawn", label: "Rasen", category: "lawn",
    items: [
      { label: "Geb.Rasen kf.",  fill: "#98e640" },
      { label: "Blumenrasen",    fill: "#98e640", swatchClass: "sw-dots" },
    ]
  },
  {
    id: "meadow", label: "Wiesen", category: "meadow",
    items: [
      { label: "Feuchtwiese",      fill: "#a8e3d9" },
      { label: "Blumenwiese gf.",  fill: "#c6eeab", swatchClass: "sw-pstripe" },
      { label: "Blumenwiese kf.",  fill: "#c6eeab" },
      { label: "Magerrasen",       fill: "#f0f0b0", swatchClass: "sw-vdots" },
      { label: "Saumvegetation",   fill: "#f0f0b0", swatchClass: "sw-odots" },
    ]
  },
  {
    id: "planting_bed", label: "Rabatten", category: "planting_bed",
    items: [
      { label: "Wechselflor",   fill: "#ff74df", swatchClass: "sw-dots" },
      { label: "Moorbeet",      fill: "#5c45a8" },
      { label: "Stauden. int.", fill: "#cc66ff", swatchClass: "sw-pstripe" },
      { label: "Stauden. ext.", fill: "#cc66ff" },
      { label: "Beetrosen",     fill: "#ff5500" },
      { label: "Ruderalfläche", fill: "#ffaa00", swatchClass: "sw-ostripe" },
    ]
  },
  {
    id: "hedge", label: "Hecken", category: "hedge",
    items: [
      { label: "Wildhecke",        fill: "#d9d89e" },
      { label: "Formhecke + 1.5 m",fill: "#c07020", swatchClass: "sw-hstripe" },
      { label: "Formhecke - 1.5 m",fill: "#c07020" },
    ]
  },
  {
    id: "woody_area", label: "Gehölzflächen", category: "woody_area",
    items: [
      { label: "Gehölz & Bodend.", fill: "#8a7248", swatchClass: "sw-dots" },
      { label: "Bodendecker",      fill: "#7a6e3e" },
      { label: "Gehölzrabatte",    fill: "#8a9044", swatchClass: "sw-gdots" },
      { label: "Wald",             fill: "#254700" },
    ]
  },
  {
    id: "special_planting", label: "Spezielle Bepflanzungsformen", category: "special_planting",
    items: [
      { label: "Dach: ext. Stauden", fill: "#ffbebe" },
    ]
  },
  {
    id: "surface", label: "Beläge", category: "surface",
    items: [
      { label: "Asphaltbelag",             fill: "#686868" },
      { label: "Rasengittersteine",         fill: "#70a800", swatchClass: "sw-xhatch" },
      { label: "Holzhäckselbelag",          fill: "#8b3a00", swatchClass: "sw-xhatch" },
      { label: "Chaussierung",              fill: "#cd8a66" },
      { label: "Betonpl./Verbund/Naturstein",fill: "#9c9c9c" },
      { label: "Geröllstreifen/Bollensteine",fill: "#6a6a6a", swatchClass: "sw-gdots" },
    ]
  },
  {
    id: "water", label: "Wasserflächen", category: "water",
    items: [
      { label: "Brunnen",          fill: "#00aae6" },
      { label: "Gewässer, ruhend", fill: "#006fff" },
    ]
  },
  {
    id: "other", label: "Anderes", category: "other",
    items: [
      { label: "Anderes", fill: "#ffff00" },
    ]
  },
  {
    id: "tree", label: "Baum", category: "tree",
    items: [
      { label: "Laubb. Kopf-/Form",         fill: "#b0e000", swatchClass: "sw-circ-cross" },
      { label: "Laubb. nat. kleink.",        fill: "#60c800", swatchClass: "sw-circ" },
      { label: "Laubb. nat. grossk.",        fill: "#38b000", swatchClass: "sw-circ" },
      { label: "Nadelb. nat.",               fill: "#1a7000", swatchClass: "sw-circ" },
      { label: "Hochstammobst",              fill: "#60c800", swatchClass: "sw-circ-cross" },
      { label: "Strassenb. Laub Kopf/Form",  fill: "#007a94", swatchClass: "sw-circ-cross" },
      { label: "Strassenb. Laub nat. kleink.",fill: "#008aaa", swatchClass: "sw-circ" },
      { label: "Strassenb. Laub nat. grossk.",fill: "#006680", swatchClass: "sw-circ" },
    ]
  },
  {
    id: "special_point", label: "Spezielle Bepflanzungsformen", category: null,
    items: [
      { label: "Pflanzgefäss mobil Dauerbepflanzung", fill: "#1a1a8a", swatchClass: "sw-circ" },
      { label: "Pflanzgefäss Wechselflor",             fill: "#cc00cc", swatchClass: "sw-circ" },
      { label: "Schling- & Kletterpf.",                fill: "#cc0000", swatchClass: "sw-triangle" },
    ]
  },
  {
    id: "kleinstrukturen", label: "Kleinstrukturen", category: null,
    items: [
      { label: "Asthaufen",        fill: "#c09060" },
      { label: "Steinhaufen",      fill: "#808080" },
      { label: "Wildbienenhotel",  fill: "#804000" },
      { label: "Baumstämme",       fill: "#604020" },
    ]
  },
];

// ── Subtype-level fill colours for map rendering ───────────────────────────
const SUBTYPE_FILL = {
  'Chaussierung':          '#cd8a66',
  'Asphaltbelag':          '#686868',
  'Rasengittersteine':     '#70a800',
  'Holzhaeckselbelag':     '#8b3a00',
  'Betonpl./Naturstein':   '#9c9c9c',
  'Geroellstreifen':       '#6a6a6a',
  'Feuchtwiese':           '#a8e3d9',
  'Blumenwiese':           '#c6eeab',
  'Saumvegetation':        '#f0f0b0',
  'Geb.Rasen kf.':         '#98e640',
  'Gehoelz & Bodend.':     '#8a7248',
  'Gehoelzrabatte':        '#8a9044',
  'Wald':                  '#254700',
  'Stauden':               '#cc66ff',
  'Moorbeet':              '#5c45a8',
  'Wechselflor':           '#ff74df',
  'Beetrosen':             '#ff5500',
  'Ruderalflaeche':        '#ffaa00',
  'Wildhecke':             '#d9d89e',
  'Formhecke':             '#c07020',
  'Objekt':                '#e8edf2',
  'Dach: ext. Stauden':    '#ffbebe',
  'Brunnen':               '#00aae6',
  'Gewaesser ruhend':      '#006fff',
  'Anderes':               '#ffff00',
};

const CAT_FILL = {
  lawn:            '#98e640', meadow: '#c6eeab',
  planting_bed:    '#cc66ff', hedge: '#c07020', woody_area: '#8a7248',
  special_planting:'#ffbebe', surface: '#9c9c9c', water: '#00aae6',
  other:           '#ffff00', tree: '#60c800',
};

function fillExpr() {
  return ['match', ['get', 'subtype'],
    ...Object.entries(SUBTYPE_FILL).flatMap(([k, v]) => [k, v]),
    ['match', ['get', 'category'],
      ...Object.entries(CAT_FILL).flatMap(([k, v]) => [k, v]),
      '#aaaaaa'
    ]
  ];
}
function lineColorExpr() {
  return ['match', ['get', 'category'],
    'water', '#0055cc',
    'rgba(0,0,0,0.28)'
  ];
}
function lineWidthExpr() {
  return 0.8;
}

// ── Group visibility state ─────────────────────────────────────────────────
const vis = {};
for (const g of LEGEND_GROUPS) vis[g.id] = true;

function buildLegendFilter() {
  const onCats = LEGEND_GROUPS
    .filter(g => vis[g.id] && g.category)
    .map(g => g.category);
  if (onCats.length === 0) return ['==', '1', '0'];
  return ['in', ['get', 'category'], ['literal', onCats]];
}
// Keep alias for initial addLayers() call
function buildMapFilter() { return buildLegendFilter(); }

let tblActiveIds = null; // null = no table filter; array of feature indices
let selectedId   = null; // currently selected feature index (null = none)

function applyMapFilters() {
  if (!map.getLayer('features-fill')) return;
  const legendF = buildLegendFilter();
  let combined;
  if (tblActiveIds === null) {
    combined = legendF;
  } else if (tblActiveIds.length === 0) {
    combined = ['==', '1', '0'];
  } else {
    combined = ['all', legendF, ['in', ['id'], ['literal', tblActiveIds]]];
  }
  map.setFilter('features-fill', combined);
  map.setFilter('features-line', combined);
}

// ── Map init ───────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [7.4742, 46.9751],
  zoom: 16, maxZoom: 22,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

// ── GeoJSON offset (used by edit mode) ────────────────────────────────────
// LV95 scale at ~47°N: 1° lat ≈ 111 320 m, 1° lon ≈ 73 500 m
let offsetDeltaLon = 0, offsetDeltaLat = 0;
let editMode = false;
let editStartLngLat = null;
let originalCenter = null;
let geojsonData = null;

// ── Load data ──────────────────────────────────────────────────────────────
const GEOJSON_PATH =
  'data/[838147959] 1602.GR_M\u00FChlestrasse 2+4+6+8Gr\u00FCnfl\u00E4chenpflege.geojson';

// ── Popup instances ─────────────────────────────────────────────────────────────
const selPopup = new maplibregl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '260px' });
selPopup.on('close', () => {
  if (selectedId === null) return; // already cleared programmatically
  selectedId = null;
  applySelectedFilter();
  updateSelectionUrl();
  renderTable();
});

// ── Popup HTML helper ────────────────────────────────────────────────────────────
function popupHTML(p) {
  return `
    <div class="pu-type">${p.feature_type || p.category}</div>
    <div class="pu-sub">${p.subtype}</div>
    <div class="pu-row"><span>Fläche</span><strong>${p.area_m2 != null ? (+p.area_m2).toFixed(1) + ' m²' : '–'}</strong></div>
    <div class="pu-row"><span>Kategorie</span><strong>${p.category}</strong></div>
    <div class="pu-row"><span>Quelle</span><strong>${p.source}</strong></div>
  `;
}

// ── Selection helpers ─────────────────────────────────────────────────────────────
function applySelectedFilter() {
  if (!map.getLayer('features-selected-fill')) return;
  const f = selectedId !== null ? ['==', ['id'], selectedId] : ['==', '1', '0'];
  map.setFilter('features-selected-fill', f);
  map.setFilter('features-selected-line', f);
}

function updateSelectionUrl() {
  const url = new URL(location.href);
  if (selectedId !== null) url.searchParams.set('sel', selectedId);
  else url.searchParams.delete('sel');
  history.replaceState(null, '', url);
}

function selectFeature(idx, lngLat) {
  selectedId = idx;
  applySelectedFilter();
  updateSelectionUrl();
  selPopup.setLngLat(lngLat).setHTML(popupHTML(geojsonData.features[idx].properties)).addTo(map);
  // Navigate table to the selected row's page
  const sorted = getSortedRows(getFilteredRows());
  const rowIdx = sorted.findIndex(r => r._idx === idx);
  if (rowIdx !== -1) tblPage = Math.floor(rowIdx / tblPageSize);
  renderTable();
  setTimeout(() => {
    document.querySelector('#tbl tbody tr.selected')?.scrollIntoView({ block: 'nearest' });
  }, 0);
}

function clearSelection() {
  if (selectedId === null) return;
  selectedId = null;
  applySelectedFilter();
  updateSelectionUrl();
  selPopup.remove(); // close event fires but guard above short-circuits it
  renderTable();
}

// ── Add GeoJSON source + layers (called on initial load and after style change) ─
function addLayers() {
  if (!geojsonData || map.getSource('features')) return;
  map.addSource('features', {
    type: 'geojson', data: geojsonData,
  });
  map.addLayer({
    id: 'features-fill', type: 'fill', source: 'features',
    paint: {
      'fill-color': fillExpr(),
      'fill-opacity': ['match', ['get', 'category'],
        'site_boundary', 0, 'building', 0.65, 0.78],
    },
  });
  map.addLayer({
    id: 'features-line', type: 'line', source: 'features',
    paint: { 'line-color': lineColorExpr(), 'line-width': lineWidthExpr() },
  });
  map.addLayer({
    id: 'features-hover', type: 'line', source: 'features',
    filter: ['==', ['id'], -1],
    paint: { 'line-color': '#005ea8', 'line-width': 2.5 },
  });
  map.addLayer({
    id: 'features-selected-fill', type: 'fill', source: 'features',
    filter: ['==', '1', '0'],
    paint: { 'fill-color': '#005ea8', 'fill-opacity': 0.22 },
  });
  map.addLayer({
    id: 'features-selected-line', type: 'line', source: 'features',
    filter: ['==', '1', '0'],
    paint: { 'line-color': '#005ea8', 'line-width': 3 },
  });
  applySelectedFilter(); // restore if selection persists across basemap change
  const f = buildMapFilter();
  map.setFilter('features-fill', f);
  map.setFilter('features-line', f);
}

map.on('load', async () => {
  let resp, gj;
  try {
    resp = await fetch(GEOJSON_PATH);
    gj = await resp.json();
  } catch (e) {
    console.error(e);
    return;
  }
  // Ensure every feature has a top-level integer id matching its array index.
  // Existing files from extract_features.py may predate this requirement.
  gj.features.forEach((f, i) => { if (f.id == null) f.id = i; });
  geojsonData = gj;

  addLayers();
  buildTable();

  // ── Hover ──────────────────────────────────────────────────────────────
  let hovId = null;

  map.on('mousemove', 'features-fill', (e) => {
    if (editMode) return;
    if (!e.features.length) return;
    map.getCanvas().style.cursor = 'pointer';
    const f = e.features[0];
    if (hovId !== f.id) {
      hovId = f.id;
      map.setFilter('features-hover', ['==', ['id'], hovId]);
    }
  });
  map.on('mouseleave', 'features-fill', () => {
    if (editMode) return;
    map.getCanvas().style.cursor = '';
    map.setFilter('features-hover', ['==', ['id'], -1]);
    hovId = null;
  });

  // ── Click: select / deselect feature ───────────────────────────────────
  map.on('click', 'features-fill', (e) => {
    if (editMode) return;
    const f = e.features[0];
    if (f.id === selectedId) { clearSelection(); return; }
    selectFeature(f.id, e.lngLat);
  });
  // Click on empty map area → clear selection
  map.on('click', (e) => {
    if (editMode) return;
    const hits = map.queryRenderedFeatures(e.point, { layers: ['features-fill'] });
    if (!hits.length) clearSelection();
  });

  // ── Fit to actual feature bounds ───────────────────────────────────────
  let minLon = Infinity, minLat = Infinity, maxLon = -Infinity, maxLat = -Infinity;
  function scanCoords(c) {
    if (typeof c[0] === 'number') {
      if (c[0] < minLon) minLon = c[0]; if (c[0] > maxLon) maxLon = c[0];
      if (c[1] < minLat) minLat = c[1]; if (c[1] > maxLat) maxLat = c[1];
    } else { c.forEach(scanCoords); }
  }
  gj.features.forEach(f => scanCoords(f.geometry.coordinates));
  map.fitBounds([[minLon, minLat], [maxLon, maxLat]], { padding: 60, maxZoom: 19 });

  // ── Build legend ───────────────────────────────────────────────────────
  buildLegend(gj.features);

  // ── Restore selection from URL (?sel=<idx>) ────────────────────────────
  const urlSel = parseInt(new URLSearchParams(location.search).get('sel'));
  if (!isNaN(urlSel) && urlSel >= 0 && urlSel < gj.features.length) {
    const feat = gj.features[urlSel];
    const bbox = geomBbox(feat.geometry);
    const center = [(bbox[0][0] + bbox[1][0]) / 2, (bbox[0][1] + bbox[1][1]) / 2];
    selectFeature(urlSel, center);
  }
});

function buildLegend(features) {
  const catCounts = {};
  for (const f of features) {
    const c = f.properties.category;
    catCounts[c] = (catCounts[c] || 0) + 1;
  }

  const el = document.getElementById('legend-scroll');
  el.innerHTML = '';

  for (const grp of LEGEND_GROUPS) {
    const hasData = grp.category && (catCounts[grp.category] || 0) > 0;

    const groupEl = document.createElement('div');
    groupEl.className = 'lg-group';
    groupEl.dataset.gid = grp.id;

    // Group header row
    const head = document.createElement('div');
    head.className = 'lg-group-head';

    const eyeBtn = document.createElement('button');
    eyeBtn.className = 'eye-btn';
    eyeBtn.title = 'Ebene ein-/ausblenden';
    eyeBtn.innerHTML = EYE_OPEN;
    eyeBtn.addEventListener('click', () => {
      if (!grp.category) return; // no map data, nothing to toggle
      vis[grp.id] = !vis[grp.id];
      eyeBtn.innerHTML = vis[grp.id] ? EYE_OPEN : EYE_CLOSED;
      eyeBtn.classList.toggle('hidden-eye', !vis[grp.id]);
      groupEl.classList.toggle('group-hidden', !vis[grp.id]);
      applyMapFilters();
    });
    if (!grp.category) {
      eyeBtn.style.opacity = '0.25';
      eyeBtn.style.cursor = 'default';
    }

    const title = document.createElement('span');
    title.className = 'lg-group-title';
    title.textContent = grp.label;
    if (hasData) {
      const cnt = document.createElement('span');
      cnt.style.cssText = 'font-size:10px;color:var(--grey-400);margin-left:4px;font-weight:400;text-transform:none;letter-spacing:0';
      cnt.textContent = catCounts[grp.category];
      title.appendChild(cnt);
    }

    head.append(eyeBtn, title);
    groupEl.appendChild(head);

    // Items
    const itemsEl = document.createElement('div');
    itemsEl.className = 'lg-items';

    for (const item of grp.items) {
      const row = document.createElement('div');
      row.className = 'lg-item' + (hasData ? '' : ' empty');

      const sw = document.createElement('span');
      sw.className = 'lg-swatch' + (item.swatchClass ? ' ' + item.swatchClass : '');
      if (item.fill && !item.swatchClass?.includes('sw-outline') &&
          !item.swatchClass?.includes('sw-triangle')) {
        sw.style.background = item.fill;
      }

      const lbl = document.createElement('span');
      lbl.className = 'lg-label';
      lbl.textContent = item.label;

      row.append(sw, lbl);
      itemsEl.appendChild(row);
    }

    groupEl.appendChild(itemsEl);
    el.appendChild(groupEl);
  }
}

editToggleBtn.addEventListener('click', () => {

  editBanner.classList.remove('visible');

});

document.getElementById('save-offset').addEventListener('click', async () => {
  if (!geojsonData) return;
  // Save offset_m to metadata (approximate metre values)
  const dLon = (geojsonData.metadata.offset_m?.[0] || 0) + pendingDelta.lon * 73500;
  const dLat = (geojsonData.metadata.offset_m?.[1] || 0) + pendingDelta.lat * 111320;
  geojsonData.metadata.offset_m = [Math.round(dLon * 10) / 10, Math.round(dLat * 10) / 10];
  geojsonData.metadata.total_features = geojsonData.features.length;

  // Apply permanent delta to all feature coordinates
  applyDeltaPermanent(pendingDelta.lon, pendingDelta.lat);
  pendingDelta = { lon: 0, lat: 0 };

  // Download updated GeoJSON
  const blob = new Blob([JSON.stringify(geojsonData, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = '[838147959] 1602.GR_Mühlestrasse 2+4+6+8Grünflächenpflege.geojson';
  a.click();

  editMode = false;
  editToggleBtn.classList.remove('active');

  saveBanner.classList.remove('visible');

// Drag handlers
map.on('mousedown', (e) => {
  if (!editMode) return;
  dragStart = { lng: e.lngLat.lng, lat: e.lngLat.lat };
  map.getCanvas().style.cursor = 'grabbing';
  map.dragPan.disable();
  e.preventDefault();
});

map.on('mousemove', (e) => {
  if (!editMode || !dragStart) return;
  const dLon = e.lngLat.lng - dragStart.lng;
  const dLat = e.lngLat.lat - dragStart.lat;
  applyDelta(dLon, dLat);
  pendingDelta.lon += dLon;
  pendingDelta.lat += dLat;
  dragStart = { lng: e.lngLat.lng, lat: e.lngLat.lat };

  const mEast  = Math.round(pendingDelta.lon * 73500);
  const mNorth = Math.round(pendingDelta.lat * 111320);
  offsetLabel.textContent = `Verschiebung: ${mEast > 0 ? '+' : ''}${mEast} m O, ${mNorth > 0 ? '+' : ''}${mNorth} m N`;
});

map.on('mouseup', () => {
  if (!editMode || !dragStart) return;
  dragStart = null;
  map.getCanvas().style.cursor = 'grab';
  map.dragPan.enable();
});

function shiftCoord(coord, dLon, dLat) {
  if (typeof coord[0] === 'number') return [coord[0] + dLon, coord[1] + dLat];
  return coord.map(c => shiftCoord(c, dLon, dLat));
}

function applyDelta(dLon, dLat) {
  if (!geojsonData) return;
  for (const f of geojsonData.features) {
    f.geometry.coordinates = shiftCoord(f.geometry.coordinates, dLon, dLat);
  }
  map.getSource('features').setData(geojsonData);
}

function applyDeltaPermanent(dLon, dLat) {
  // Already applied incrementally during drag — nothing extra to do.
  // The geojsonData coordinates are already shifted.
}

// ═══════════════════════════════════════════════════════════════════════════
// TABLE WIDGET
// ═══════════════════════════════════════════════════════════════════════════
const TABLE_COLS = [
  { key: 'feature_type', label: 'Typ',       visible: true  },
  { key: 'subtype',      label: 'Subtyp',    visible: true  },
  { key: 'category',     label: 'Kategorie', visible: false },
  { key: 'area_m2',      label: 'Fläche m²', visible: true,
    fmt: v => v != null ? (+v).toFixed(1) : '–' },
  { key: 'source',       label: 'Quelle',    visible: false },
];

let tableRows = [];
let tblSortCol = 'area_m2', tblSortDir = -1;
let tblSearch = '';
let tblFilterAttrs = {};
let tblPage = 0, tblPageSize = 25;

function buildTable() {
  if (!geojsonData) return;
  tableRows = geojsonData.features.map((f, i) => ({ ...f.properties, _idx: i }));
  buildColDropdown();
  buildFilterDropdown();
  renderTable();
}

function getFilteredRows() {
  let rows = tableRows;
  if (tblSearch) {
    const q = tblSearch.toLowerCase();
    rows = rows.filter(r =>
      TABLE_COLS.some(c => String(r[c.key] ?? '').toLowerCase().includes(q))
    );
  }
  for (const [field, val] of Object.entries(tblFilterAttrs)) {
    if (val !== '') rows = rows.filter(r => String(r[field] ?? '') === val);
  }
  return rows;
}

function getSortedRows(rows) {
  return [...rows].sort((a, b) => {
    const av = a[tblSortCol], bv = b[tblSortCol];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * tblSortDir;
    return String(av).localeCompare(String(bv)) * tblSortDir;
  });
}

function renderTable() {
  const filtered = getFilteredRows();
  const sorted = getSortedRows(filtered);

  // Clamp page
  const totalPages = Math.max(1, Math.ceil(sorted.length / tblPageSize));
  if (tblPage >= totalPages) tblPage = totalPages - 1;
  const pageRows = sorted.slice(tblPage * tblPageSize, (tblPage + 1) * tblPageSize);

  // Sync table filter to map
  tblActiveIds = filtered.length < tableRows.length ? filtered.map(r => r._idx) : null;
  applyMapFilters();

  // thead
  const visCols = TABLE_COLS.filter(c => c.visible);
  const thead = document.querySelector('#tbl thead');
  thead.innerHTML = '<tr>' + visCols.map(c =>
    `<th data-col="${c.key}" class="${tblSortCol === c.key ? 'sort-' + (tblSortDir > 0 ? 'asc' : 'desc') : ''}">${c.label}</th>`
  ).join('') + '</tr>';
  thead.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (tblSortCol === col) tblSortDir *= -1;
      else { tblSortCol = col; tblSortDir = -1; }
      tblPage = 0;
      renderTable();
    });
  });

  // tbody — current page only
  const tbody = document.querySelector('#tbl tbody');
  tbody.innerHTML = '';
  for (const row of pageRows) {
    const tr = document.createElement('tr');
    tr.dataset.idx = row._idx;
    if (row._idx === selectedId) tr.classList.add('selected');
    for (const c of visCols) {
      const td = document.createElement('td');
      td.textContent = c.fmt ? c.fmt(row[c.key]) : (row[c.key] ?? '–');
      tr.appendChild(td);
    }
    tr.addEventListener('mouseenter', () => {
      if (map.getLayer('features-hover'))
        map.setFilter('features-hover', ['==', ['id'], row._idx]);
    });
    tr.addEventListener('mouseleave', () => {
      if (map.getLayer('features-hover'))
        map.setFilter('features-hover', ['==', ['id'], -1]);
    });
    tr.addEventListener('click', () => {
      const feat = geojsonData.features[row._idx];
      if (!feat) return;
      const bbox = geomBbox(feat.geometry);
      if (row._idx === selectedId) { clearSelection(); return; }
      const center = [(bbox[0][0] + bbox[1][0]) / 2, (bbox[0][1] + bbox[1][1]) / 2];
      selectFeature(row._idx, center);
      map.fitBounds(bbox, { padding: 80, maxZoom: 20 });
    });
    tbody.appendChild(tr);
  }

  // Pagination controls
  renderPagination(sorted.length, totalPages);
}

function renderPagination(total, totalPages) {
  const start = tblPage * tblPageSize + 1;
  const end   = Math.min((tblPage + 1) * tblPageSize, total);
  document.getElementById('pg-info').textContent =
    total === 0 ? 'Keine Einträge' : `${start}–${end} von ${total}`;

  document.getElementById('pg-first').disabled = tblPage === 0;
  document.getElementById('pg-prev').disabled  = tblPage === 0;
  document.getElementById('pg-next').disabled  = tblPage >= totalPages - 1;
  document.getElementById('pg-last').disabled  = tblPage >= totalPages - 1;

  // Page number buttons (max 5 around current)
  const pagesEl = document.getElementById('pg-pages');
  pagesEl.innerHTML = '';
  const range = pageRange(tblPage, totalPages, 5);
  for (const p of range) {
    if (p === '…') {
      const sp = document.createElement('span');
      sp.textContent = '…'; sp.style.padding = '0 4px'; sp.style.color = 'var(--grey-400)';
      pagesEl.appendChild(sp);
    } else {
      const btn = document.createElement('button');
      btn.className = 'pg-btn' + (p === tblPage ? ' pg-active' : '');
      btn.textContent = p + 1;
      btn.addEventListener('click', () => { tblPage = p; renderTable(); });
      pagesEl.appendChild(btn);
    }
  }
}

function pageRange(current, total, window) {
  if (total <= window + 2) return Array.from({ length: total }, (_, i) => i);
  const half = Math.floor(window / 2);
  let start = Math.max(1, current - half);
  let end   = Math.min(total - 2, start + window - 1);
  if (end - start < window - 1) start = Math.max(1, end - window + 1);
  const pages = [0];
  if (start > 1) pages.push('…');
  for (let i = start; i <= end; i++) pages.push(i);
  if (end < total - 2) pages.push('…');
  pages.push(total - 1);
  return pages;
}

function geomBbox(geom) {
  let mn = [Infinity, Infinity], mx = [-Infinity, -Infinity];
  function scan(c) {
    if (typeof c[0] === 'number') {
      if (c[0] < mn[0]) mn[0] = c[0]; if (c[0] > mx[0]) mx[0] = c[0];
      if (c[1] < mn[1]) mn[1] = c[1]; if (c[1] > mx[1]) mx[1] = c[1];
    } else c.forEach(scan);
  }
  scan(geom.coordinates);
  return [mn, mx];
}

// ── Column selector ─────────────────────────────────────────────────────────
function buildColDropdown() {
  const dd = document.getElementById('tbl-col-dd');
  dd.innerHTML = `<div class="dd-menu-label">Sichtbare Spalten</div>` +
    TABLE_COLS.map(c =>
      `<label class="col-check-item">
        <input type="checkbox" data-col="${c.key}" ${c.visible ? 'checked' : ''}>
        ${c.label}
      </label>`
    ).join('');
  dd.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const col = TABLE_COLS.find(c => c.key === cb.dataset.col);
      if (col) { col.visible = cb.checked; renderTable(); }
    });
  });
}

// ── Filter dropdown ──────────────────────────────────────────────────────────
function buildFilterDropdown() {
  if (!tableRows.length) return;
  const dd = document.getElementById('tbl-filter-dd');
  const filterCols = ['feature_type', 'subtype', 'category', 'source'];
  dd.innerHTML = `<div class="dd-menu-label">Attribut filtern</div>` +
    filterCols.map(key => {
      const col = TABLE_COLS.find(c => c.key === key);
      const label = col ? col.label : key;
      const vals = [...new Set(tableRows.map(r => String(r[key] ?? '')).filter(Boolean))].sort();
      const cur = tblFilterAttrs[key] || '';
      return `<div class="filter-row">
        <span class="filter-label">${label}</span>
        <select data-field="${key}">
          <option value="">Alle</option>
          ${vals.map(v => `<option value="${v}"${cur === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
      </div>`;
    }).join('') +
    `<div class="filter-actions"><button id="tbl-filter-clear" class="filter-clear-btn">Filter zurücksetzen</button></div>`;

  dd.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', () => {
      tblFilterAttrs[sel.dataset.field] = sel.value;
      tblPage = 0;
      updateFilterBadge();
      renderTable();
    });
  });
  const clr = dd.querySelector('#tbl-filter-clear');
  if (clr) clr.addEventListener('click', () => {
    tblFilterAttrs = {};
    tblPage = 0;
    buildFilterDropdown();
    updateFilterBadge();
    renderTable();
  });
}

function updateFilterBadge() {
  const n = Object.values(tblFilterAttrs).filter(v => v !== '').length;
  const badge = document.getElementById('tbl-filter-badge');
  badge.textContent = n > 0 ? n : '';
  badge.style.display = n > 0 ? 'inline-block' : 'none';
  document.getElementById('filter-dd-btn').classList.toggle('has-active', n > 0);
}

// ── Export ──────────────────────────────────────────────────────────────────
function exportCSV(rows) {
  const header = TABLE_COLS.map(c => `"${c.label}"`).join(',');
  const lines = rows.map(r =>
    TABLE_COLS.map(c => {
      const v = c.fmt ? c.fmt(r[c.key]) : (r[c.key] ?? '');
      return `"${String(v).replace(/"/g, '""')}"`;
    }).join(',')
  );
  downloadBlob(new Blob(['\ufeff' + [header, ...lines].join('\n')],
    { type: 'text/csv;charset=utf-8' }), 'features.csv');
}

function exportGeoJSON(rows) {
  const idxSet = new Set(rows.map(r => r._idx));
  const fc = {
    type: 'FeatureCollection',
    features: geojsonData.features.filter((_, i) => idxSet.has(i))
  };
  downloadBlob(new Blob([JSON.stringify(fc, null, 2)], { type: 'application/json' }),
    'features.geojson');
}

function exportExcel(rows) {
  const wsData = [
    TABLE_COLS.map(c => c.label),
    ...rows.map(r => TABLE_COLS.map(c => c.fmt ? c.fmt(r[c.key]) : (r[c.key] ?? '')))
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Features');
  XLSX.writeFile(wb, 'features.xlsx');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Dropdown toggle logic ────────────────────────────────────────────────────
['col-dd-wrap', 'filter-dd-wrap', 'export-dd-wrap'].forEach(wrapId => {
  const wrap = document.getElementById(wrapId);
  wrap.querySelector('.dd-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = wrap.classList.contains('open');
    document.querySelectorAll('.dd-wrap.open').forEach(el => el.classList.remove('open'));
    if (!isOpen) wrap.classList.add('open');
  });
});
document.addEventListener('click', () => {
  document.querySelectorAll('.dd-wrap.open').forEach(el => el.classList.remove('open'));
});

// ── Export buttons ────────────────────────────────────────────────────────────
document.getElementById('exp-csv').addEventListener('click', (e) => {
  e.stopPropagation(); exportCSV(tableRows); closeExportDd();
});
document.getElementById('exp-csv-f').addEventListener('click', () => {
  exportCSV(getSortedRows(getFilteredRows())); closeExportDd();
});
document.getElementById('exp-geojson').addEventListener('click', () => {
  exportGeoJSON(tableRows); closeExportDd();
});
document.getElementById('exp-geojson-f').addEventListener('click', () => {
  exportGeoJSON(getFilteredRows()); closeExportDd();
});
document.getElementById('exp-xlsx').addEventListener('click', () => {
  exportExcel(tableRows); closeExportDd();
});
document.getElementById('exp-xlsx-f').addEventListener('click', () => {
  exportExcel(getSortedRows(getFilteredRows())); closeExportDd();
});
function closeExportDd() {
  document.getElementById('export-dd-wrap').classList.remove('open');
}
</script>
</body>
</html>
