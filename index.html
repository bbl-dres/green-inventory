<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grünflächen Inventar – BBL</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root {
      --grey-900: #2D3236; --grey-800: #3D4347; --grey-700: #4E555A;
      --grey-600: #5E666B; --grey-500: #6C757D; --grey-400: #A0A8AE;
      --grey-300: #C5CCD1; --grey-200: #DDE2E6; --grey-100: #F3F5F7;
      --grey-50:  #F9FAFB; --white: #ffffff;
      --primary: #005ea8; --red: #cc0000;
      --header-height: 56px; --footer-height: 32px; --panel-width: 280px;
      --text-xs: 11px; --text-sm: 12.5px; --text-base: 14px;
      --sp1: 2px; --sp2: 4px; --sp3: 8px; --sp4: 12px; --sp5: 16px;
      --radius: 5px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif;
                 font-size: var(--text-base); color: var(--grey-900); }

    /* ── App shell ─────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ────────────────────────────────── */
    #header {
      height: var(--header-height);
      background: var(--white);
      border-bottom: 1px solid var(--grey-300);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--sp5); flex-shrink: 0; z-index: 10; gap: var(--sp5);
    }
    .header-title { display: flex; flex-direction: column; gap: 1px; }
    .header-agency { font-size: var(--text-xs); color: var(--grey-500); font-weight: 500; letter-spacing: .02em; }
    .header-app    { font-size: 15px; font-weight: 700; color: var(--grey-900); }
    .header-right  { display: flex; align-items: center; gap: var(--sp3); }
    .badge {
      background: var(--grey-100); border: 1px solid var(--grey-300);
      border-radius: 20px; padding: 2px 10px;
      font-size: var(--text-xs); color: var(--grey-600); white-space: nowrap;
    }
    .edit-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--white); border: 1.5px solid var(--grey-300);
      border-radius: var(--radius); padding: 5px 12px;
      font-size: var(--text-sm); color: var(--grey-700); cursor: pointer;
      transition: all .15s;
    }
    .edit-btn:hover { border-color: var(--primary); color: var(--primary); }
    .edit-btn.active { background: #fff3cd; border-color: #e6a817; color: #7a5700; }
    .edit-btn svg { flex-shrink: 0; }

    /* ── Body ───────────────────────────────────── */
    #body { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────── */
    #sidebar {
      width: var(--panel-width); background: var(--white);
      border-right: 1px solid var(--grey-300);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    #sidebar-header {
      padding: 9px var(--sp5); border-bottom: 1px solid var(--grey-200);
      font-size: var(--text-xs); font-weight: 700; color: var(--grey-500);
      text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }
    #legend-scroll { flex: 1; overflow-y: auto; padding: var(--sp2) 0 var(--sp4); }

    /* ── Legend groups ──────────────────────────── */
    .lg-group { margin-bottom: 2px; }
    .lg-group-head {
      display: flex; align-items: center; gap: var(--sp2);
      padding: 5px var(--sp4) 3px var(--sp3);
    }
    .lg-group-head .eye-btn {
      flex-shrink: 0; width: 20px; height: 20px;
      background: none; border: none; cursor: pointer;
      color: var(--grey-400); padding: 1px;
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
      transition: color .12s;
    }
    .lg-group-head .eye-btn:hover { color: var(--grey-700); }
    .lg-group-head .eye-btn.hidden-eye { color: var(--grey-300); }
    .lg-group-title {
      font-size: var(--text-xs); font-weight: 700; color: var(--grey-700);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .lg-items { padding: 0 var(--sp4) 2px 34px; }
    .lg-item {
      display: flex; align-items: center; gap: 7px;
      padding: 2px 0; opacity: 1; transition: opacity .2s;
    }
    .lg-item.empty { opacity: 0.38; }
    .lg-swatch {
      width: 22px; height: 13px; border-radius: 3px; flex-shrink: 0;
      border: 1px solid rgba(0,0,0,.12);
    }
    /* Pattern swatches via CSS */
    .sw-dots    { background-image: radial-gradient(circle, #333 30%, transparent 30%);
                  background-size: 5px 5px; }
    .sw-vdots   { background-image: radial-gradient(circle, #856a00 40%, transparent 40%);
                  background-size: 5px 5px; }
    .sw-odots   { background-image: radial-gradient(circle, #804000 35%, transparent 35%);
                  background-size: 4px 4px; }
    .sw-pstripe { background-image: repeating-linear-gradient(45deg,#9040c0 0,#9040c0 1.5px,transparent 0,transparent 50%);
                  background-size: 5px 5px; }
    .sw-ostripe { background-image: repeating-linear-gradient(45deg,#c05000 0,#c05000 1.5px,transparent 0,transparent 50%);
                  background-size: 5px 5px; }
    .sw-hstripe { background-image: repeating-linear-gradient(45deg,#5a3800 0,#5a3800 1.5px,transparent 0,transparent 50%);
                  background-size: 5px 5px; }
    .sw-xhatch  { background-image:
                    repeating-linear-gradient(45deg,  #333 0,#333 1px,transparent 0,transparent 50%),
                    repeating-linear-gradient(-45deg, #333 0,#333 1px,transparent 0,transparent 50%);
                  background-size: 5px 5px; }
    .sw-gdots   { background-image: radial-gradient(circle, #555 30%, transparent 30%);
                  background-size: 5px 5px; }
    .sw-outline { background: transparent !important; border: 2px solid #cc0000 !important; }
    .sw-circ    { border-radius: 50% !important; width: 13px !important; height: 13px !important;
                  border: 2px solid rgba(0,0,0,.25) !important; }
    .sw-circ-cross { border-radius: 50% !important; width: 13px !important; height: 13px !important;
                     border: 2px solid rgba(0,0,0,.4) !important; position: relative; }
    .sw-circ-cross::before, .sw-circ-cross::after {
      content:''; position:absolute; background: rgba(0,0,0,.5);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .sw-circ-cross::before { width: 7px; height: 1.5px; }
    .sw-circ-cross::after  { width: 1.5px; height: 7px; }
    .sw-triangle { width: 0 !important; height: 0 !important; background: transparent !important;
                   border-left: 7px solid transparent; border-right: 7px solid transparent;
                   border-bottom: 12px solid #cc0000; border-top: none !important; border-radius: 0 !important; }
    .lg-label { font-size: var(--text-sm); color: var(--grey-800); line-height: 1.3; }
    .group-hidden .lg-items { opacity: 0.3; pointer-events: none; }

    /* ── Map ─────────────────────────────────────── */
    #map { flex: 1; position: relative; }
    .maplibregl-ctrl-top-right { top: var(--sp3); right: var(--sp3); }
    .maplibregl-popup-content {
      padding: var(--sp4) var(--sp5); border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,.16); font-size: var(--text-sm); min-width: 180px;
    }
    .pu-type { font-weight: 700; margin-bottom: 3px; }
    .pu-sub  { color: var(--grey-600); margin-bottom: 6px; font-size: var(--text-xs); }
    .pu-row  { display: flex; justify-content: space-between;
               font-size: var(--text-xs); color: var(--grey-500); margin-top: 2px; }
    .pu-row strong { color: var(--grey-800); }

    /* ── Edit mode banner ───────────────────────── */
    #edit-banner {
      display: none; position: absolute; top: var(--sp3); left: 50%;
      transform: translateX(-50%); z-index: 20;
      background: #fff3cd; border: 1.5px solid #e6a817;
      border-radius: var(--radius); padding: 6px 16px;
      font-size: var(--text-sm); color: #7a5700; pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    #edit-banner.visible { display: block; }
    #save-banner {
      display: none; position: absolute; bottom: var(--sp5); left: 50%;
      transform: translateX(-50%); z-index: 20;
      background: var(--white); border: 1.5px solid var(--grey-300);
      border-radius: var(--radius); padding: 8px 20px;
      font-size: var(--text-sm); color: var(--grey-800);
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      display: none; align-items: center; gap: var(--sp4);
    }
    #save-banner.visible { display: flex; }
    #save-banner button {
      background: var(--primary); color: var(--white); border: none;
      border-radius: var(--radius); padding: 5px 14px; cursor: pointer;
      font-size: var(--text-sm); font-weight: 600;
    }
    #save-banner button:hover { background: #004a87; }
    #save-banner .cancel-btn {
      background: none; color: var(--grey-600); border: 1px solid var(--grey-300);
    }
    #save-banner .cancel-btn:hover { background: var(--grey-100); }

    /* ── Footer ──────────────────────────────────── */
    #footer {
      height: var(--footer-height); background: var(--grey-100);
      border-top: 1px solid var(--grey-300);
      padding: 0 var(--sp5); font-size: var(--text-xs); color: var(--grey-600);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; z-index: 10;
    }
    #coordinates { font-family: monospace; }
    #footer-links a { color: var(--primary); text-decoration: none; margin-left: var(--sp4); }
    #footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-title">
      <span class="header-agency">Bundesamt für Bauten und Logistik</span>
      <span class="header-app">Grünflächen Inventar</span>
    </div>
    <div class="header-right">
      <span class="badge" id="feat-badge">Lade…</span>
      <span class="badge">1:650 · WGS 84</span>
      <button class="edit-btn" id="edit-toggle" title="Position korrigieren">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Position bearbeiten
      </button>
    </div>
  </header>

  <!-- ── Body ───────────────────────────────────────────────────────────── -->
  <div id="body">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">Legende</div>
      <div id="legend-scroll" id="legend-list"></div>
    </aside>

    <!-- Map -->
    <div id="map">
      <div id="edit-banner">Ziehen Sie die Karte, um alle Features zu verschieben. Klicken Sie auf Speichern.</div>
      <div id="save-banner">
        <span id="offset-label">Verschiebung: 0 m, 0 m</span>
        <button id="save-offset">Speichern</button>
        <button class="cancel-btn" id="cancel-offset">Abbrechen</button>
      </div>
    </div>

  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer id="footer">
    <div id="coordinates">WGS 84 | Koordinaten: --</div>
    <div id="footer-links">
      <a href="https://github.com/bbl-dres/green-inventory" target="_blank">Quellcode</a>
      <a href="https://www.admin.ch/gov/de/start/rechtliches.html" target="_blank">Rechtliches</a>
      <a href="https://www.bbl.admin.ch/de/kontakt" target="_blank">Kontakt</a>
    </div>
  </footer>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════════════════════════════
// LEGEND DEFINITION  (mirrors the plan legend exactly)
// Each group: { id, label, category (for map filter), items[] }
// Each item:  { label, swatchClass?, fill?, stroke?, note? }
// ═══════════════════════════════════════════════════════════════════════════
const LEGEND_GROUPS = [
  {
    id: "lawn", label: "Rasen", category: "lawn",
    items: [
      { label: "Geb.Rasen kf.",  fill: "#98e640" },
      { label: "Blumenrasen",    fill: "#98e640", swatchClass: "sw-dots" },
    ]
  },
  {
    id: "meadow", label: "Wiesen", category: "meadow",
    items: [
      { label: "Feuchtwiese",      fill: "#a8e3d9" },
      { label: "Blumenwiese gf.",  fill: "#c6eeab", swatchClass: "sw-pstripe" },
      { label: "Blumenwiese kf.",  fill: "#c6eeab" },
      { label: "Magerrasen",       fill: "#f0f0b0", swatchClass: "sw-vdots" },
      { label: "Saumvegetation",   fill: "#f0f0b0", swatchClass: "sw-odots" },
    ]
  },
  {
    id: "planting_bed", label: "Rabatten", category: "planting_bed",
    items: [
      { label: "Wechselflor",   fill: "#ff74df", swatchClass: "sw-dots" },
      { label: "Moorbeet",      fill: "#5c45a8" },
      { label: "Stauden. int.", fill: "#cc66ff", swatchClass: "sw-pstripe" },
      { label: "Stauden. ext.", fill: "#cc66ff" },
      { label: "Beetrosen",     fill: "#ff5500" },
      { label: "Ruderalfläche", fill: "#ffaa00", swatchClass: "sw-ostripe" },
    ]
  },
  {
    id: "hedge", label: "Hecken", category: "hedge",
    items: [
      { label: "Wildhecke",        fill: "#d9d89e" },
      { label: "Formhecke + 1.5 m",fill: "#c07020", swatchClass: "sw-hstripe" },
      { label: "Formhecke - 1.5 m",fill: "#c07020" },
    ]
  },
  {
    id: "woody_area", label: "Gehölzflächen", category: "woody_area",
    items: [
      { label: "Gehölz & Bodend.", fill: "#8a7248", swatchClass: "sw-dots" },
      { label: "Bodendecker",      fill: "#7a6e3e" },
      { label: "Gehölzrabatte",    fill: "#8a9044", swatchClass: "sw-gdots" },
      { label: "Wald",             fill: "#254700" },
    ]
  },
  {
    id: "special_planting", label: "Spezielle Bepflanzungsformen", category: "special_planting",
    items: [
      { label: "Dach: ext. Stauden", fill: "#ffbebe" },
    ]
  },
  {
    id: "surface", label: "Beläge", category: "surface",
    items: [
      { label: "Asphaltbelag",             fill: "#686868" },
      { label: "Rasengittersteine",         fill: "#70a800", swatchClass: "sw-xhatch" },
      { label: "Holzhäckselbelag",          fill: "#8b3a00", swatchClass: "sw-xhatch" },
      { label: "Chaussierung",              fill: "#cd8a66" },
      { label: "Betonpl./Verbund/Naturstein",fill: "#9c9c9c" },
      { label: "Geröllstreifen/Bollensteine",fill: "#6a6a6a", swatchClass: "sw-gdots" },
    ]
  },
  {
    id: "water", label: "Wasserflächen", category: "water",
    items: [
      { label: "Brunnen",          fill: "#00aae6" },
      { label: "Gewässer, ruhend", fill: "#006fff" },
    ]
  },
  {
    id: "other", label: "Anderes", category: "other",
    items: [
      { label: "Anderes", fill: "#ffff00" },
    ]
  },
  {
    id: "tree", label: "Baum", category: "tree",
    items: [
      { label: "Laubb. Kopf-/Form",         fill: "#b0e000", swatchClass: "sw-circ-cross" },
      { label: "Laubb. nat. kleink.",        fill: "#60c800", swatchClass: "sw-circ" },
      { label: "Laubb. nat. grossk.",        fill: "#38b000", swatchClass: "sw-circ" },
      { label: "Nadelb. nat.",               fill: "#1a7000", swatchClass: "sw-circ" },
      { label: "Hochstammobst",              fill: "#60c800", swatchClass: "sw-circ-cross" },
      { label: "Strassenb. Laub Kopf/Form",  fill: "#007a94", swatchClass: "sw-circ-cross" },
      { label: "Strassenb. Laub nat. kleink.",fill: "#008aaa", swatchClass: "sw-circ" },
      { label: "Strassenb. Laub nat. grossk.",fill: "#006680", swatchClass: "sw-circ" },
    ]
  },
  {
    id: "special_point", label: "Spezielle Bepflanzungsformen", category: null,
    items: [
      { label: "Pflanzgefäss mobil Dauerbepflanzung", fill: "#1a1a8a", swatchClass: "sw-circ" },
      { label: "Pflanzgefäss Wechselflor",             fill: "#cc00cc", swatchClass: "sw-circ" },
      { label: "Schling- & Kletterpf.",                fill: "#cc0000", swatchClass: "sw-triangle" },
    ]
  },
  {
    id: "kleinstrukturen", label: "Kleinstrukturen", category: null,
    items: [
      { label: "Asthaufen",        fill: "#c09060" },
      { label: "Steinhaufen",      fill: "#808080" },
      { label: "Wildbienenhotel",  fill: "#804000" },
      { label: "Baumstämme",       fill: "#604020" },
    ]
  },
];

// ── Subtype-level fill colours for map rendering ───────────────────────────
const SUBTYPE_FILL = {
  'Chaussierung':          '#cd8a66',
  'Asphaltbelag':          '#686868',
  'Rasengittersteine':     '#70a800',
  'Holzhaeckselbelag':     '#8b3a00',
  'Betonpl./Naturstein':   '#9c9c9c',
  'Geroellstreifen':       '#6a6a6a',
  'Feuchtwiese':           '#a8e3d9',
  'Blumenwiese':           '#c6eeab',
  'Saumvegetation':        '#f0f0b0',
  'Geb.Rasen kf.':         '#98e640',
  'Gehoelz & Bodend.':     '#8a7248',
  'Gehoelzrabatte':        '#8a9044',
  'Wald':                  '#254700',
  'Stauden':               '#cc66ff',
  'Moorbeet':              '#5c45a8',
  'Wechselflor':           '#ff74df',
  'Beetrosen':             '#ff5500',
  'Ruderalflaeche':        '#ffaa00',
  'Wildhecke':             '#d9d89e',
  'Formhecke':             '#c07020',
  'Objekt':                '#e8edf2',
  'Dach: ext. Stauden':    '#ffbebe',
  'Brunnen':               '#00aae6',
  'Gewaesser ruhend':      '#006fff',
  'Anderes':               '#ffff00',
};

const CAT_FILL = {
  lawn:            '#98e640', meadow: '#c6eeab',
  planting_bed:    '#cc66ff', hedge: '#c07020', woody_area: '#8a7248',
  special_planting:'#ffbebe', surface: '#9c9c9c', water: '#00aae6',
  other:           '#ffff00', tree: '#60c800',
};

function fillExpr() {
  return ['match', ['get', 'subtype'],
    ...Object.entries(SUBTYPE_FILL).flatMap(([k, v]) => [k, v]),
    ['match', ['get', 'category'],
      ...Object.entries(CAT_FILL).flatMap(([k, v]) => [k, v]),
      '#aaaaaa'
    ]
  ];
}
function lineColorExpr() {
  return ['match', ['get', 'category'],
    'water', '#0055cc',
    'rgba(0,0,0,0.28)'
  ];
}
function lineWidthExpr() {
  return 0.8;
}

// ── Group visibility state ─────────────────────────────────────────────────
const vis = {};
for (const g of LEGEND_GROUPS) vis[g.id] = true;

function buildMapFilter() {
  const onCats = LEGEND_GROUPS
    .filter(g => vis[g.id] && g.category)
    .map(g => g.category);
  if (onCats.length === 0) return ['==', '1', '0'];
  return ['in', ['get', 'category'], ['literal', onCats]];
}

// ── Map init ───────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [7.4742, 46.9751],
  zoom: 16, maxZoom: 22,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

// ── GeoJSON offset (used by edit mode) ────────────────────────────────────
// LV95 scale at ~47°N: 1° lat ≈ 111 320 m, 1° lon ≈ 73 500 m
let offsetDeltaLon = 0, offsetDeltaLat = 0;
let editMode = false;
let editStartLngLat = null;
let originalCenter = null;
let geojsonData = null;

// ── Load data ──────────────────────────────────────────────────────────────
const GEOJSON_PATH =
  'data/[838147959] 1602.GR_M\u00FChlestrasse 2+4+6+8Gr\u00FCnfl\u00E4chenpflege.geojson';

map.on('load', async () => {
  let resp, gj;
  try {
    resp = await fetch(GEOJSON_PATH);
    gj = await resp.json();
  } catch (e) {
    document.getElementById('feat-badge').textContent = 'Ladefehler';
    console.error(e);
    return;
  }
  geojsonData = gj;

  document.getElementById('feat-badge').textContent =
    `${gj.features.length} Features`;

  map.addSource('features', {
    type: 'geojson', data: gj, promoteId: '__AUTO__',
  });

  map.addLayer({
    id: 'features-fill', type: 'fill', source: 'features',
    paint: {
      'fill-color': fillExpr(),
      'fill-opacity': ['match', ['get', 'category'],
        'site_boundary', 0, 'building', 0.65, 0.78],
    },
  });
  map.addLayer({
    id: 'features-line', type: 'line', source: 'features',
    paint: {
      'line-color': lineColorExpr(),
      'line-width': lineWidthExpr(),
    },
  });
  map.addLayer({
    id: 'features-hover', type: 'line', source: 'features',
    filter: ['==', ['id'], -1],
    paint: { 'line-color': '#005ea8', 'line-width': 2.5 },
  });

  // ── Popup / hover ──────────────────────────────────────────────────────
  const popup = new maplibregl.Popup({
    closeButton: false, closeOnClick: false, maxWidth: '260px',
  });
  let hovId = null;

  map.on('mousemove', 'features-fill', (e) => {
    if (editMode) return;
    if (!e.features.length) return;
    map.getCanvas().style.cursor = 'pointer';
    const f = e.features[0], p = f.properties;
    if (hovId !== f.id) {
      hovId = f.id;
      map.setFilter('features-hover', ['==', ['id'], hovId]);
    }
    popup.setLngLat(e.lngLat).setHTML(`
      <div class="pu-type">${p.feature_type || p.category}</div>
      <div class="pu-sub">${p.subtype}</div>
      <div class="pu-row"><span>Fläche</span><strong>${p.area_m2 != null ? (+p.area_m2).toFixed(1) + ' m²' : '–'}</strong></div>
      <div class="pu-row"><span>Kategorie</span><strong>${p.category}</strong></div>
      <div class="pu-row"><span>Quelle</span><strong>${p.source}</strong></div>
    `).addTo(map);
  });
  map.on('mouseleave', 'features-fill', () => {
    if (editMode) return;
    map.getCanvas().style.cursor = '';
    map.setFilter('features-hover', ['==', ['id'], -1]);
    hovId = null;
    popup.remove();
  });

  // ── Fit to actual feature bounds ───────────────────────────────────────
  let minLon = Infinity, minLat = Infinity, maxLon = -Infinity, maxLat = -Infinity;
  function scanCoords(c) {
    if (typeof c[0] === 'number') {
      if (c[0] < minLon) minLon = c[0]; if (c[0] > maxLon) maxLon = c[0];
      if (c[1] < minLat) minLat = c[1]; if (c[1] > maxLat) maxLat = c[1];
    } else { c.forEach(scanCoords); }
  }
  gj.features.forEach(f => scanCoords(f.geometry.coordinates));
  map.fitBounds([[minLon, minLat], [maxLon, maxLat]], { padding: 60, maxZoom: 19 });

  // ── Build legend ───────────────────────────────────────────────────────
  buildLegend(gj.features);
});

// ── Coordinate display ─────────────────────────────────────────────────────
const coordEl = document.getElementById('coordinates');
map.on('mousemove', e => {
  const { lng, lat } = e.lngLat;
  coordEl.textContent = `WGS 84 | ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
});
map.on('mouseout', () => { coordEl.textContent = 'WGS 84 | Koordinaten: --'; });

// ═══════════════════════════════════════════════════════════════════════════
// LEGEND BUILDER
// ═══════════════════════════════════════════════════════════════════════════
function buildLegend(features) {
  const catCounts = {};
  for (const f of features) {
    const c = f.properties.category;
    catCounts[c] = (catCounts[c] || 0) + 1;
  }

  const el = document.getElementById('legend-scroll');
  el.innerHTML = '';

  for (const grp of LEGEND_GROUPS) {
    const hasData = grp.category && (catCounts[grp.category] || 0) > 0;

    const groupEl = document.createElement('div');
    groupEl.className = 'lg-group';
    groupEl.dataset.gid = grp.id;

    // Group header row
    const head = document.createElement('div');
    head.className = 'lg-group-head';

    const eyeBtn = document.createElement('button');
    eyeBtn.className = 'eye-btn';
    eyeBtn.title = 'Ebene ein-/ausblenden';
    eyeBtn.innerHTML = EYE_OPEN;
    eyeBtn.addEventListener('click', () => {
      if (!grp.category) return; // no map data, nothing to toggle
      vis[grp.id] = !vis[grp.id];
      eyeBtn.innerHTML = vis[grp.id] ? EYE_OPEN : EYE_CLOSED;
      eyeBtn.classList.toggle('hidden-eye', !vis[grp.id]);
      groupEl.classList.toggle('group-hidden', !vis[grp.id]);
      map.setFilter('features-fill', buildMapFilter());
      map.setFilter('features-line', buildMapFilter());
    });
    if (!grp.category) {
      eyeBtn.style.opacity = '0.25';
      eyeBtn.style.cursor = 'default';
    }

    const title = document.createElement('span');
    title.className = 'lg-group-title';
    title.textContent = grp.label;
    if (hasData) {
      const cnt = document.createElement('span');
      cnt.style.cssText = 'font-size:10px;color:var(--grey-400);margin-left:4px;font-weight:400;text-transform:none;letter-spacing:0';
      cnt.textContent = catCounts[grp.category];
      title.appendChild(cnt);
    }

    head.append(eyeBtn, title);
    groupEl.appendChild(head);

    // Items
    const itemsEl = document.createElement('div');
    itemsEl.className = 'lg-items';

    for (const item of grp.items) {
      const row = document.createElement('div');
      row.className = 'lg-item' + (hasData ? '' : ' empty');

      const sw = document.createElement('span');
      sw.className = 'lg-swatch' + (item.swatchClass ? ' ' + item.swatchClass : '');
      if (item.fill && !item.swatchClass?.includes('sw-outline') &&
          !item.swatchClass?.includes('sw-triangle')) {
        sw.style.background = item.fill;
      }

      const lbl = document.createElement('span');
      lbl.className = 'lg-label';
      lbl.textContent = item.label;

      row.append(sw, lbl);
      itemsEl.appendChild(row);
    }

    groupEl.appendChild(itemsEl);
    el.appendChild(groupEl);
  }
}

const EYE_OPEN = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
  <circle cx="12" cy="12" r="3"/>
</svg>`;
const EYE_CLOSED = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
  <line x1="1" y1="1" x2="23" y2="23"/>
</svg>`;

// ═══════════════════════════════════════════════════════════════════════════
// EDIT MODE  — drag to reposition entire GeoJSON layer
// ═══════════════════════════════════════════════════════════════════════════
const editToggleBtn = document.getElementById('edit-toggle');
const editBanner    = document.getElementById('edit-banner');
const saveBanner    = document.getElementById('save-banner');
const offsetLabel   = document.getElementById('offset-label');

let dragStart = null;
let pendingDelta = { lon: 0, lat: 0 };

editToggleBtn.addEventListener('click', () => {
  editMode = !editMode;
  editToggleBtn.classList.toggle('active', editMode);
  editBanner.classList.toggle('visible', editMode);
  saveBanner.classList.toggle('visible', editMode);
  map.getCanvas().style.cursor = editMode ? 'grab' : '';
  if (!editMode) { pendingDelta = { lon: 0, lat: 0 }; }
});

document.getElementById('cancel-offset').addEventListener('click', () => {
  // Revert visual delta
  applyDelta(-pendingDelta.lon, -pendingDelta.lat);
  pendingDelta = { lon: 0, lat: 0 };
  editMode = false;
  editToggleBtn.classList.remove('active');
  editBanner.classList.remove('visible');
  saveBanner.classList.remove('visible');
  map.getCanvas().style.cursor = '';
});

document.getElementById('save-offset').addEventListener('click', async () => {
  if (!geojsonData) return;
  // Save offset_m to metadata (approximate metre values)
  const dLon = (geojsonData.metadata.offset_m?.[0] || 0) + pendingDelta.lon * 73500;
  const dLat = (geojsonData.metadata.offset_m?.[1] || 0) + pendingDelta.lat * 111320;
  geojsonData.metadata.offset_m = [Math.round(dLon * 10) / 10, Math.round(dLat * 10) / 10];
  geojsonData.metadata.total_features = geojsonData.features.length;

  // Apply permanent delta to all feature coordinates
  applyDeltaPermanent(pendingDelta.lon, pendingDelta.lat);
  pendingDelta = { lon: 0, lat: 0 };

  // Download updated GeoJSON
  const blob = new Blob([JSON.stringify(geojsonData, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = '[838147959] 1602.GR_Mühlestrasse 2+4+6+8Grünflächenpflege.geojson';
  a.click();
  URL.revokeObjectURL(url);

  editMode = false;
  editToggleBtn.classList.remove('active');
  editBanner.classList.remove('visible');
  saveBanner.classList.remove('visible');
  map.getCanvas().style.cursor = '';
});

// Drag handlers
map.on('mousedown', (e) => {
  if (!editMode) return;
  dragStart = { lng: e.lngLat.lng, lat: e.lngLat.lat };
  map.getCanvas().style.cursor = 'grabbing';
  map.dragPan.disable();
  e.preventDefault();
});

map.on('mousemove', (e) => {
  if (!editMode || !dragStart) return;
  const dLon = e.lngLat.lng - dragStart.lng;
  const dLat = e.lngLat.lat - dragStart.lat;
  applyDelta(dLon, dLat);
  pendingDelta.lon += dLon;
  pendingDelta.lat += dLat;
  dragStart = { lng: e.lngLat.lng, lat: e.lngLat.lat };

  const mEast  = Math.round(pendingDelta.lon * 73500);
  const mNorth = Math.round(pendingDelta.lat * 111320);
  offsetLabel.textContent = `Verschiebung: ${mEast > 0 ? '+' : ''}${mEast} m O, ${mNorth > 0 ? '+' : ''}${mNorth} m N`;
});

map.on('mouseup', () => {
  if (!editMode || !dragStart) return;
  dragStart = null;
  map.getCanvas().style.cursor = 'grab';
  map.dragPan.enable();
});

function shiftCoord(coord, dLon, dLat) {
  if (typeof coord[0] === 'number') return [coord[0] + dLon, coord[1] + dLat];
  return coord.map(c => shiftCoord(c, dLon, dLat));
}

function applyDelta(dLon, dLat) {
  if (!geojsonData) return;
  for (const f of geojsonData.features) {
    f.geometry.coordinates = shiftCoord(f.geometry.coordinates, dLon, dLat);
  }
  map.getSource('features').setData(geojsonData);
}

function applyDeltaPermanent(dLon, dLat) {
  // Already applied incrementally during drag — nothing extra to do.
  // The geojsonData coordinates are already shifted.
}
